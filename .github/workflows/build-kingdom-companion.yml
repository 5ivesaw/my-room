name: Build Kingdom Companion

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "kingdom-companion/**"
      - ".github/workflows/build-kingdom-companion.yml"

permissions:
  contents: read

concurrency:
  group: kingdom-companion-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-build:
    name: Compact Windows builds
    runs-on: windows-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: kingdom-companion

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Verify dependency lockfile
        shell: pwsh
        run: |
          if (!(Test-Path package-lock.json)) { throw "kingdom-companion/package-lock.json is missing from the repository." }

      - name: Install exact dependencies
        run: npm ci --no-audit --no-fund

      - name: Build maximally-compressed Windows executables
        run: npm run build:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload installer only
        uses: actions/upload-artifact@v7
        with:
          name: Kingdom-Companion-Installer
          path: kingdom-companion/dist/Kingdom-Companion-Setup-*.exe
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

      - name: Upload portable app only
        uses: actions/upload-artifact@v7
        with:
          name: Kingdom-Companion-Portable
          path: kingdom-companion/dist/Kingdom-Companion-Portable-*.exe
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
